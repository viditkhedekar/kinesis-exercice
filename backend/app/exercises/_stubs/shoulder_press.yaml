key: shoulder_press
name: Shoulder Press

metrics:
  elbow:
    type: angle
    points: [shoulder, elbow, wrist]  # large = pressed overhead
    sided: true
  torso:
    type: segment_vertical_angle
    points: [hip, shoulder]

rep:
  signal: elbow
  direction: peak
  smooth_window: 7
  min_prominence: 25
  min_distance_frames: 8
  bottom_threshold: 140

rules:
  - id: incomplete_lockout
    type: metric_threshold_at_phase
    severity: moderate
    weight: 20
    message: "Arms aren't reaching full overhead lockout."
    params: { metric: elbow, aggregate: max, comparator: lt, threshold: 155 }
  - id: excessive_arch
    type: metric_threshold_at_phase
    severity: moderate
    weight: 16
    message: "Trunk is leaning back excessively — brace the core to avoid arching the lower back."
    params: { metric: torso, aggregate: max, comparator: gt, threshold: 20 }
  - id: arm_asymmetry
    type: asymmetry
    severity: minor
    weight: 12
    message: "Arms are pressing unevenly."
    params: { metric: elbow, aggregate: max, max_diff: 18 }

score_base: 100
