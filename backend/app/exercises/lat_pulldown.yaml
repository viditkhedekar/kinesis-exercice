key: lat_pulldown
name: Lat Pulldown

metrics:
  elbow: { type: angle, points: [shoulder, elbow, wrist], sided: true }    # small = bar pulled down
  torso: { type: segment_vertical_angle, points: [hip, shoulder], sided: true }
  shoulder_ext: { type: angle, points: [hip, shoulder, elbow], sided: true }

rep:
  signal: elbow
  direction: valley                   # pull-down = minimum elbow angle
  smooth_window: 7
  min_prominence: 25
  min_distance_frames: 8
  bottom_threshold: 95

rules:
  - id: short_rom
    type: insufficient_rom
    message: "Partial pull — the bar doesn't reach the upper chest, or the arms don't fully extend at the top, so the lats miss their strongest range."
    tip: "Pull the bar to the collarbone and let it rise until the arms are fully straight between reps."
    joints: [elbow]
    params: { metric: elbow, min_rom: 55, moderate_at: 40, severe_at: 28, unit: deg, plane: sagittal }

  - id: incomplete_stretch
    type: metric_threshold_at_phase
    message: "The arms don't fully straighten at the top, cutting off the stretched position where the lats load up."
    tip: "Let the bar travel all the way up and feel the lats lengthen before the next pull."
    joints: [elbow]
    params: { metric: elbow, phase: top, aggregate: value_at, comparator: lt, threshold: 155, moderate_at: 145, severe_at: 130, unit: deg, plane: sagittal }

  - id: torso_swing
    type: metric_aggregate
    message: "The torso swings back to heave the bar down, turning a lat exercise into a whole-body pull."
    tip: "Keep the trunk near-upright with only a slight lean; pull with the back, not by rocking."
    joints: [hip, shoulder]
    params: { metric: torso, aggregate: range, comparator: gt, threshold: 18, moderate_at: 28, severe_at: 42, unit: deg, plane: sagittal }

  - id: rom_asymmetry
    type: rom_asymmetry
    message: "The two arms pull through different ranges — one lat is doing more of the work."
    tip: "Pull evenly to a level bar; address the weaker side with single-arm work."
    joints: [elbow]
    params: { metric: elbow, max_diff: 18, moderate_at: 30, severe_at: 50, unit: deg, plane: frontal }

  - id: shoulder_shrug
    type: landmark_drift
    message: "The shoulders shrug up at the top (shown side) instead of the shoulder blades staying set, handing work to the traps."
    tip: "Start each rep by pulling the shoulder blades down, then drive the elbows to the floor."
    params: { landmark: shoulder, reference: hip, axis: y, aggregate: net_up, threshold: 8, moderate_at: 14, severe_at: 22, sided: true, plane: frontal }

  - id: inconsistent_tempo
    type: tempo_consistency
    message: "Rep tempo drifts across the set, usually fatigue and form breaking down late."
    tip: "Hold a steady pull-and-control cadence; end the set when it collapses."
    joints: [elbow]
    params: { max_cv: 28, moderate_at: 40, severe_at: 60 }

score_base: 100
